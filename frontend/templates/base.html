<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Report Card System</title>
    <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

{% if user %}
<nav class="navbar">
    <div class="nav-brand">📋 Report Card System</div>
    <div class="nav-links">
        {% if user.role == "student" %}
            <a href="/my-report">My Report</a>
            <a href="/feedback">Feedback</a>
            <a href="/lost-found">Lost & Found</a>
        {% else %}
            <a href="/dashboard">Dashboard</a>
            <a href="/analytics">Analytics</a>
            <a href="/feedback">Feedback</a>
            <a href="/lost-found">Lost & Found</a>
        {% endif %}
        <span class="nav-user">👤 {{ user.username }} ({{ user.role }})</span>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
        <a href="/logout" class="btn-logout">Logout</a>
    </div>
</nav>
{% endif %}

<div class="main-content">
    {% block content %}{% endblock %}
</div>

<script>
    function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        const btn = document.getElementById("themeBtn");
        if (btn) {
            btn.textContent = theme === "dark" ? "☀ Light" : "🌙 Dark";
        }
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute("data-theme") || "light";
        const next = current === "dark" ? "light" : "dark";
        applyTheme(next);
        document.cookie = "theme=" + next + "; path=/; max-age=31536000";
    }

    // read theme from cookie on page load
    (function() {
        const match = document.cookie.match(/theme=(dark|light)/);
        const saved = match ? match[1] : "light";
        applyTheme(saved);
    })();
</script>

</body>
</html>
