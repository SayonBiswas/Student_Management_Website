{% extends "base.html" %}
{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>📋 Report Card System</h2>
        <h3>Create Account</h3>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/register">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required/>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter email" required/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min 6 characters" required/>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role">
                    <option value="teacher">Teacher</option>
                    <option value="admin">Admin</option>
                    <option value="student">Student</option>
                </select>
            </div>
            <div class="form-group">
                <label>Admission Number <small style="color: var(--text-muted);">(required for students only)</small></label>
                <input type="number" name="admission_number" placeholder="Enter admission number"/>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Register</button>
        </form>

        <p class="auth-link">Already have an account? <a href="/login">Sign in</a></p>
    </div>
</div>

{% endblock %}
